<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yönetimi | EduNex Admin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/login.css">
</head>
<body>

    <main class="admin-login-wrapper">
        <article class="admin-login-card">
            
            <header class="admin-login-header">
                <div class="shield-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1>EduNex Yönetim</h1>
                <p>Sistem erişimi için yönetici kimliğinizi doğrulayın.</p>
            </header>

            <form id="adminLoginForm" class="admin-form">
                <div class="form-group">
                    <label for="adminEposta">Yönetici E-posta</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="adminEposta" placeholder="admin@edunex.com" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminSifre">Erişim Şifresi</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="adminSifre" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-admin-login" id="adminSubmitBtn">
                    Sisteme Giriş Yap <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div id="adminLogMessage" class="message-box" role="alert" aria-live="polite"></div>

            <footer class="admin-login-footer">
                <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Ana Siteye Dön</a>
                <span class="security-badge"><i class="fas fa-lock"></i> 256-bit Güvenli Bağlantı</span>
            </footer>

        </article>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/admin/js/login.js"></script>
</body>
</html>
