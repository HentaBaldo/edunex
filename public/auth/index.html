<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Giris ve Kayit</title>

    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/auth/css/auth.css">
</head>
<body>

<main class="auth-wrapper">
    <article class="auth-card">
        <nav class="auth-tabs" role="tablist">
            <button class="tab-btn active" id="tabLogin" role="tab" aria-selected="true" aria-controls="loginSection">Giris Yap</button>
            <button class="tab-btn" id="tabRegister" role="tab" aria-selected="false" aria-controls="registerSection">Kayit Ol</button>
        </nav>

        <section class="auth-section active" id="loginSection" role="tabpanel">
            <header class="auth-header">
                <h2>Hos Geldiniz</h2>
                <p class="subtitle">Hesabiniza erismek icin giris bilgilerinizi doldurun.</p>
            </header>

            <form id="loginForm">
                <div class="form-group">
                    <label for="logEposta">E-posta Adresi</label>
                    <input type="email" id="logEposta" class="form-control" placeholder="name@domain.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="logSifre">Sifre</label>
                    <input type="password" id="logSifre" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary" id="loginSubmitBtn">Giris Yap</button>
            </form>
            <div id="logMessage" class="message-box" role="alert" aria-live="polite"></div>
        </section>

        <section class="auth-section" id="registerSection" role="tabpanel">
            <header class="auth-header">
                <h2>Hesap Olustur</h2>
                <p class="subtitle">EduNex ogrenme topluluguna bugun katilin.</p>
            </header>

            <form id="registerForm">
                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="regAd">Ad</label>
                        <input type="text" id="regAd" class="form-control" required placeholder="Adiniz">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="regSoyad">Soyad</label>
                        <input type="text" id="regSoyad" class="form-control" required placeholder="Soyadiniz">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regEposta">E-posta Adresi</label>
                    <input type="email" id="regEposta" class="form-control" required placeholder="name@domain.com" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="regSifre">Sifre</label>
                    <input type="password" id="regSifre" class="form-control" placeholder="En az 6 karakter" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="regRol">Hesap Turu</label>
                    <select id="regRol" class="form-control">
                        <option value="ogrenci">Ogrenci</option>
                        <option value="egitmen">Egitmen</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary" id="regSubmitBtn">Hemen Kayit Ol</button>
            </form>
            <div id="regMessage" class="message-box" role="alert" aria-live="polite"></div>
        </section>
    </article>
</main>

<script src="/assets/js/api.js"></script>
<script src="/auth/js/auth.js"></script>

</body>
</html>
