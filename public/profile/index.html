<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Profil Ayarları</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/main/css/main.css">
    
    <link rel="stylesheet" href="css/index.css">
    
    <style>
        .profile-header-img { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 4px solid #f8f9fa; }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        .section-title { border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body class="bg-light">

<div id="navbar-container"></div>

<div class="container py-5 mt-4">
    <div class="row">
        <div class="col-lg-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body text-center">
                    <img id="display_profil_fotografi" src="/assets/images/default-avatar.png" alt="Profil" class="profile-header-img mb-3">
                    <h5 id="display_tam_ad" class="mb-0">Yükleniyor...</h5>
                    <p id="display_rol" class="text-muted small">Rol Belirleniyor</p>
                    <button class="btn btn-outline-primary btn-sm mt-2" onclick="document.getElementById('file_input').click()">Fotoğraf Değiştir</button>
                    <input type="file" id="file_input" style="display: none;" accept="image/*">
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="list-group list-group-flush" id="profile-tabs" role="tablist">
                    <a class="list-group-item list-group-item-action active" id="tab-genel" data-bs-toggle="pill" href="#genel" role="tab">
                        <i class="fas fa-user me-2"></i>Genel Bilgiler
                    </a>
                    <a class="list-group-item list-group-item-action" id="tab-profesyonel" data-bs-toggle="pill" href="#profesyonel" role="tab">
                        <i class="fas fa-briefcase me-2"></i>Profesyonel Detaylar
                    </a>
                    <a class="list-group-item list-group-item-action" id="tab-sosyal" data-bs-toggle="pill" href="#sosyal" role="tab">
                        <i class="fas fa-share-alt me-2"></i>Sosyal Medya
                    </a>
                    <a class="list-group-item list-group-item-action" id="tab-ayarlar" data-bs-toggle="pill" href="#ayarlar" role="tab">
                        <i class="fas fa-cog me-2"></i>Hesap Ayarları
                    </a>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <form id="profileForm">
                <div class="tab-content shadow-sm p-4 bg-white rounded">
                    
                    <div class="tab-pane fade show active" id="genel" role="tabpanel">
                        <h5 class="section-title">Genel Bilgiler</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Ad</label>
                                <input type="text" id="ad" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Soyad</label>
                                <input type="text" id="soyad" class="form-control" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">E-posta (Değiştirilemez)</label>
                                <input type="email" id="eposta" class="form-control bg-light" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Şehir</label>
                                <input type="text" id="sehir" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Kişisel Web Sitesi</label>
                                <input type="url" id="website" class="form-control" placeholder="https://">
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="profesyonel" role="tabpanel">
                        <h5 class="section-title">Profesyonel Detaylar</h5>
                        
                        <div class="mb-3">
                            <label class="form-label">Profil Başlığı (Slogan)</label>
                            <input type="text" id="baslik" class="form-control" placeholder="Örn: Kıdemli Full-stack Geliştirici">
                        </div>

                        <div id="egitmen_ozel" style="display: none;">
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Unvan</label>
                                    <input type="text" id="unvan" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Deneyim Yılı</label>
                                    <input type="number" id="deneyim_yili" class="form-control">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">IBAN Numarası</label>
                                    <input type="text" id="iban_no" class="form-control" placeholder="TR00...">
                                </div>
                            </div>
                        </div>

                        <div id="ogrenci_ozel" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label">Eğitim Seviyesi</label>
                                <select id="egitim_seviyesi" class="form-select">
                                    <option value="Lise">Lise</option>
                                    <option value="Önlisans">Önlisans</option>
                                    <option value="Lisans">Lisans</option>
                                    <option value="Yüksek Lisans">Yüksek Lisans</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Biyografi</label>
                            <textarea id="biyografi" class="form-control" rows="5"></textarea>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="sosyal" role="tabpanel">
                        <h5 class="section-title">Sosyal Medya Hesapları</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fab fa-linkedin"></i></span>
                                    <input type="text" id="linkedin" class="form-control" placeholder="LinkedIn Kullanıcı Adı">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fab fa-instagram"></i></span>
                                    <input type="text" id="instagram" class="form-control" placeholder="Instagram Kullanıcı Adı">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fab fa-x-twitter"></i></span>
                                    <input type="text" id="x_twitter" class="form-control" placeholder="X (Twitter) Kullanıcı Adı">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fab fa-youtube"></i></span>
                                    <input type="text" id="youtube" class="form-control" placeholder="YouTube Kanal Linki">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fab fa-facebook"></i></span>
                                    <input type="text" id="facebook" class="form-control">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fab fa-tiktok"></i></span>
                                    <input type="text" id="tiktok" class="form-control">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="ayarlar" role="tabpanel">
                        <h5 class="section-title">Gizlilik ve Hesap Ayarları</h5>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="profil_herkese_acik_mi" checked>
                            <label class="form-check-label">Profilim arama sonuçlarında görünsün</label>
                        </div>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" id="alinan_kurslari_goster" checked>
                            <label class="form-check-label">Aldığım kurslar profilimde listelensin</label>
                        </div>
                        <hr>
                        <h6 class="text-danger">Tehlikeli Bölge</h6>
                        <button type="button" class="btn btn-outline-danger btn-sm">Hesabımı Devre Dışı Bırak</button>
                    </div>

                    <div class="mt-4 pt-3 border-top text-end">
                        <button type="submit" class="btn btn-primary px-5 shadow-sm">
                            <i class="fas fa-save me-2"></i>Profilimi Güncelle
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/main/js/main.js"></script>
<script src="/main/js/loadNavbar.js"></script>
<script src="js/index.js"></script>

</body>
</html>
