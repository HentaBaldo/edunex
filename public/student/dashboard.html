<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Öğrenme Merkezim</title>

    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/main/css/main.css">
    <link rel="stylesheet" href="/student/css/student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="container dashboard-container">

        <!-- HERO: Karşılama + İstatistikler -->
        <section class="lh-hero">
            <div class="lh-hero-text">
                <h1>Hoş geldin, <span id="heroName">Öğrenci</span>! 👋</h1>
                <p>Kaldığın yerden devam et ve hedeflerine ulaş.</p>
            </div>
            <div class="lh-stats-row">
                <div class="lh-stat-card">
                    <div class="lh-stat-icon" style="background:#eff6ff;">
                        <i class="fas fa-book-open" style="color:#2563eb;"></i>
                    </div>
                    <div>
                        <div class="lh-stat-value" id="statTotal">–</div>
                        <div class="lh-stat-label">Kayıtlı Kurs</div>
                    </div>
                </div>
                <div class="lh-stat-card">
                    <div class="lh-stat-icon" style="background:#f0fdf4;">
                        <i class="fas fa-check-circle" style="color:#16a34a;"></i>
                    </div>
                    <div>
                        <div class="lh-stat-value" id="statCompleted">–</div>
                        <div class="lh-stat-label">Tamamlanan</div>
                    </div>
                </div>
                <div class="lh-stat-card">
                    <div class="lh-stat-icon" style="background:#fefce8;">
                        <i class="fas fa-certificate" style="color:#ca8a04;"></i>
                    </div>
                    <div>
                        <div class="lh-stat-value" id="statCerts">–</div>
                        <div class="lh-stat-label">Sertifika</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- DEVAM ET KARTI -->
        <section id="resumeSection" style="display:none;" class="lh-resume-section">
            <h2 class="lh-section-title">
                <i class="fas fa-play-circle" style="color:#2563eb;"></i> Kaldığın Yerden Devam Et
            </h2>
            <div class="lh-resume-card">
                <div class="lh-resume-thumb" id="resumeThumb">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="lh-resume-info">
                    <div class="lh-resume-badge">Son Görüntülenen</div>
                    <h3 id="resumeTitle">–</h3>
                    <p id="resumeInstructor" class="lh-resume-instructor">
                        <i class="fas fa-chalkboard-teacher"></i> –
                    </p>
                    <div class="lh-resume-progress-wrap">
                        <div class="lh-resume-bar-bg">
                            <div class="lh-resume-bar-fill" id="resumeBar" style="width:0%"></div>
                        </div>
                        <span id="resumePercent" class="lh-resume-percent">%0 Tamamlandı</span>
                    </div>
                    <a id="resumeBtn" href="#" class="lh-btn-resume">
                        <i class="fas fa-play"></i> Öğrenmeye Devam Et
                    </a>
                </div>
            </div>
        </section>

        <!-- KURSLARIM GRİD -->
        <section class="lh-courses-section">
            <div class="lh-section-header">
                <h2 class="lh-section-title">
                    <i class="fas fa-layer-group" style="color:#7c3aed;"></i> Kurslarım
                </h2>
                <div class="lh-header-actions">
                    <a href="/student/cart.html" class="lh-action-link" style="position:relative;">
                        <i class="fas fa-shopping-cart"></i> Sepetim
                        <span id="dashCartBadge" class="lh-cart-badge" style="display:none;"></span>
                    </a>
                    <a href="/student/orders.html" class="lh-action-link">
                        <i class="fas fa-receipt"></i> Siparişlerim
                    </a>
                </div>
            </div>

            <div id="enrolledCourses" class="lh-course-grid">
                <div class="lh-loading">
                    <div class="lh-spinner"></div>
                    <p>Kurslarınız yükleniyor...</p>
                </div>
            </div>
        </section>

    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/main/js/main.js"></script>
    <script src="/main/js/loadNavbar.js"></script>
    <script src="/student/js/student.js"></script>
</body>
</html>
