<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Profili - EduNex</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/main/index.html" class="logo">EduNex</a>
        <div class="user-nav">
            <div id="uyeMenu" class="dropdown">
                <span id="navIsim" style="cursor: pointer; font-weight: 600; color: var(--primary-color);">Yükleniyor... ▼</span>
                <div class="dropdown-menu">
                    <a class="dropdown-item" onclick="profilSayfasinaGit()">Profil</a>
                    <a class="dropdown-item" onclick="ogrenimIcerigineGit()">Öğrenim İçeriğim</a>
                    <hr style="border: 0; border-top: 1px solid var(--surface-border); margin: 10px 0;">
                    <a class="dropdown-item" style="color: #ff4757;" onclick="cikisYap()">Çıkış</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="content-section">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
            <div class="course-card" style="padding: 20px; text-align: center; border: 1px solid var(--primary-color);">
                <small style="color: var(--text-muted); text-transform: uppercase;">Kayıtlı Kurs</small>
                <h2 id="statKayitli" style="margin: 10px 0 0 0; color: var(--primary-color) !important;">0</h2>
            </div>
            <div class="course-card" style="padding: 20px; text-align: center; border: 1px solid var(--secondary-color);">
                <small style="color: var(--text-muted); text-transform: uppercase;">Tamamlanan</small>
                <h2 id="statTamamlanan" style="margin: 10px 0 0 0; color: var(--secondary-color) !important;">0</h2>
            </div>
            <div class="course-card" style="padding: 20px; text-align: center; border: 1px solid #00ff88;">
                <small style="color: var(--text-muted); text-transform: uppercase;">İzleme Süresi</small>
                <h2 id="statSure" style="margin: 10px 0 0 0; color: #00ff88 !important;">0 dk</h2>
            </div>
        </div>

        <div class="dashboard-header" style="display: block;">
            <h2 style="margin-top:0; border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 30px;">Kişisel Bilgiler ve Eğitim</h2>
            
            <form id="profilFormuStudent">
                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex:1;"><label>Ad</label><input type="text" id="profAd" required></div>
                    <div class="form-group" style="flex:1;"><label>Soyad</label><input type="text" id="profSoyad" required></div>
                </div>

                <div class="form-group">
                    <label>Profil Başlığı (Kısa Tanıtım)</label>
                    <input type="text" id="profBaslik" placeholder="Örn: Bilgisayar Programcılığı Öğrencisi">
                </div>

                <div class="form-group">
                    <label>Eğitim Seviyesi</label>
                    <select id="profEgitim">
                        <option value="lise">Lise</option>
                        <option value="üniversite">Üniversite</option>
                        <option value="mezun">Mezun</option>
                        <option value="diğer">Diğer</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Biyografi</label>
                    <textarea id="profBiyo" rows="4" placeholder="Kendinizden ve hedeflerinizden bahsedin..."></textarea>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 15px;">
                    <button type="button" class="action-btn" style="background: transparent !important; color: #fff !important; border: 1px solid var(--surface-border) !important;" onclick="window.location.href='/main/index.html'">Vazgeç</button>
                    <button type="submit" class="action-btn">Profilimi Güncelle</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/profil.js"></script>
</body>
</html>
