<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Kurs Yönetimi</title>
    
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/instructor/css/instructor-common.css">
    <link rel="stylesheet" href="/instructor/css/instructor-forms.css">
    <link rel="stylesheet" href="/instructor/css/instructor-edit.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-content">
            <a href="/" class="logo">EduNex</a>
            <nav class="nav-actions">
                <a href="/instructor/dashboard.html" class="nav-link"><i class="fas fa-arrow-left"></i> Panoya Dön</a>
                <button onclick="logout()" class="btn-logout-alt">Çıkış Yap</button>
            </nav>
        </div>
    </header>

    <main class="container dashboard-container">
        <div class="edit-course-layout">
            
            <aside class="sidebar-aside">
                <nav class="sidebar-menu">
                    <button class="active" onclick="switchTab('mufredat')"><i class="fas fa-list-ul"></i> Müfredat Yönetimi</button>
                    <button onclick="switchTab('ayarlar')"><i class="fas fa-cog"></i> Kurs Ayarları</button>
                </nav>
            </aside>

            <section class="content-area">
                
                <article id="mufredat" class="tab-content active form-card">
                    <div class="tab-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px;">
                        <div>
                            <h2 class="form-section-title" style="border:none; margin:0; padding:0;">Kurs Müfredatı</h2>
                            <p class="subtitle" style="font-size: 0.9rem; margin-top: 5px;">Kursunuzu bölümlere ayırın ve içerik ekleyin.</p>
                        </div>
                        <button onclick="sendCourseForApproval()" class="btn-primary-lg-alt" style="background-color: #10b981;">
                            <i class="fas fa-paper-plane"></i> Onaya Gönder
                        </button>
                    </div>
                    
                    <div style="margin-bottom: 25px;">
                        <button class="btn-primary-lg-alt" onclick="showSectionModal()">
                            <i class="fas fa-folder-plus"></i> Yeni Bölüm Ekle
                        </button>
                    </div>

                    <div id="mufredatListesi" class="curriculum-container">
                        <p style="text-align:center; padding: 30px; color:#64748b;">Müfredat yükleniyor...</p>
                    </div>
                </article>

                <article id="ayarlar" class="tab-content form-card" style="display: none;">
                    <h2 class="form-section-title">Kurs Ayarları</h2>
                    <p class="subtitle">Fiyatlandırma, yayın durumu ve diğer temel ayarlar yakında buraya eklenecek.</p>
                </article>

            </section>
        </div>
    </main>

    <div id="bolumEkleModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-bottom: 15px; color:#0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Yeni Bölüm Oluştur</h3>
            <form id="bolumEkleForm">
                <div class="form-group">
                    <label class="form-label">Bölüm Başlığı</label>
                    <input type="text" id="bolum_baslik" class="form-control" placeholder="Örn: Modül 1: Temel Kavramlar" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Bölüm Açıklaması (İsteğe Bağlı)</label>
                    <textarea id="bolum_aciklama" class="form-control" rows="3" placeholder="Öğrenciler bu bölümde ne öğrenecek?"></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary-lg-alt" style="padding: 8px 16px; font-size: 0.9rem;">Kaydet</button>
                    <button type="button" onclick="closeSectionModal()" class="btn-logout-alt" style="border-color:#64748b; color:#64748b;">İptal</button>
                </div>
            </form>
        </div>
    </div>

    <div id="dersEkleModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-bottom: 15px; color:#0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Yeni Ders Ekle</h3>
            <form id="dersEkleForm">
                <input type="hidden" id="secili_bolum_id">
                
                <div class="form-group">
                    <label class="form-label">Ders Başlığı</label>
                    <input type="text" id="ders_baslik" class="form-control" required placeholder="Örn: Değişkenler ve Veri Tipleri">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label class="form-label">İçerik Tipi</label>
                        <select id="icerik_tipi" class="form-control" required>
                            <option value="video">Video</option>
                            <option value="article">Makale / Metin</option>
                            <option value="document">Doküman (PDF vb.)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Süre (Saniye)</label>
                        <input type="number" id="sure_saniye" class="form-control" value="0">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Kaynak Linki (Video ID veya URL)</label>
                    <input type="text" id="kaynak_url" class="form-control" placeholder="Örn: YouTube linki veya bulut dosya bağlantısı">
                </div>

                <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px;">
                    <input type="checkbox" id="onizleme_mi" style="width: 18px; height: 18px;">
                    <label for="onizleme_mi" style="margin: 0; font-weight: 500; color: #475569;">Bu dersi "Ücretsiz Önizleme"ye aç</label>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary-lg-alt" style="padding: 8px 16px; font-size: 0.9rem;">Dersi Kaydet</button>
                    <button type="button" onclick="closeLessonModal()" class="btn-logout-alt" style="border-color:#64748b; color:#64748b;">İptal</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box" style="text-align: center; max-width: 400px;">
            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #f59e0b; margin-bottom: 15px;"></i>
            <h3 id="confirmTitle" style="margin-bottom: 10px;">Emin misiniz?</h3>
            <p id="confirmMessage" style="color: #64748b; margin-bottom: 25px;">Bu işlem geri alınamaz.</p>
            
            <div style="display: flex; justify-content: center; gap: 15px;">
                <button id="confirmBtn" class="btn-logout-alt" style="background:#dc3545; color:white; border-color:#dc3545;">Evet, Sil</button>
                <button onclick="closeConfirmModal()" class="btn-logout-alt" style="border-color:#64748b; color:#64748b;">İptal</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/instructor/js/edit-course.js"></script>
</body>
</html>
