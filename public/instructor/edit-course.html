<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Kurs Yönetimi</title>
    
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/instructor/css/instructor.css">
    <link rel="stylesheet" href="/instructor/css/instructor-forms.css">
    <link rel="stylesheet" href="/instructor/css/instructor-edit.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-content">
            <a href="/" class="logo">EduNex</a>
            <nav class="nav-actions">
                <a href="/instructor/dashboard.html" class="nav-link">
                    <i class="fas fa-arrow-left"></i> Panoya Dön
                </a>
                <button type="button" onclick="handleLogout()" class="btn-logout-alt">Çıkış Yap</button>
            </nav>
        </div>
    </header>

    <main class="container dashboard-container">
        <div class="edit-course-layout">
            
            <!-- Sidebar Menu -->
            <aside class="sidebar-aside">
                <nav class="sidebar-menu">
                    <button type="button" class="active" onclick="window.switchTab('mufredat')">
                        <i class="fas fa-list-ul"></i> Müfredat Yönetimi
                    </button>
                    <button type="button" onclick="window.switchTab('ayarlar')">
                        <i class="fas fa-cog"></i> Kurs Ayarları
                    </button>
                </nav>
            </aside>

            <!-- Content Area -->
            <section class="content-area">
                
                <!-- Müfredat Tab -->
                <article id="mufredat" class="tab-content active form-card">
                    <div class="tab-header">
                        <div>
                            <h2 class="form-section-title">Kurs Müfredatı</h2>
                            <p class="subtitle">Kursunuzu bölümlere ayırın ve içerik ekleyin.</p>
                        </div>
                        <button type="button" onclick="window.sendCourseForApproval()" class="btn-primary-lg-alt btn-send-approval">
                            <i class="fas fa-paper-plane"></i> Onaya Gönder
                        </button>
                    </div>
                    
                    <div class="add-section-btn-wrapper">
                        <button type="button" class="btn-primary-lg-alt" onclick="window.showSectionModal()">
                            <i class="fas fa-folder-plus"></i> Yeni Bölüm Ekle
                        </button>
                    </div>

                    <div id="mufredatListesi" class="curriculum-container">
                        <p class="loading-text">Müfredat yükleniyor...</p>
                    </div>
                </article>

                <!-- Ayarlar Tab -->
                <article id="ayarlar" class="tab-content form-card">
                    <h2 class="form-section-title">Kurs Ayarları</h2>
                    <p class="subtitle">Fiyatlandırma, yayın durumu ve diğer temel ayarlar yakında buraya eklenecek.</p>
                </article>

            </section>
        </div>
    </main>

    <!-- Bölüm Ekleme Modalı -->
    <div id="bolumEkleModal" class="modal-overlay">
        <div class="modal-box">
            <h3 class="modal-title">Yeni Bölüm Oluştur</h3>
            <form id="bolumEkleForm" class="modal-form">
                <div class="form-group">
                    <label for="bolum_baslik" class="form-label">Bölüm Başlığı</label>
                    <input type="text" id="bolum_baslik" class="form-control" placeholder="Orn: Modul 1: Temel Kavramlar" required>
                </div>
                
                <div class="form-group">
                    <label for="bolum_aciklama" class="form-label">Bölüm Açıklaması (İsteğe Bağlı)</label>
                    <textarea id="bolum_aciklama" class="form-control" rows="3" placeholder="Öğrenciler bu bölümde ne öğrenecek?"></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary-lg-alt">Kaydet</button>
                    <button type="button" onclick="window.closeSectionModal()" class="btn-logout-alt">İptal</button>
                </div>
            </form>
        </div>
    </div>

        <!-- Ders Ekleme Modalı -->
        <div id="dersEkleModal" class="modal-overlay">
            <div class="modal-box">
                <h3 class="modal-title">Yeni Ders Ekle</h3>
                <form id="dersEkleForm" class="modal-form">
                    <input type="hidden" id="secili_bolum_id">
                    
                    <div class="form-group">
                        <label for="ders_baslik" class="form-label">Ders Başlığı</label>
                        <input type="text" id="ders_baslik" class="form-control" required placeholder="Orn: Değişkenler ve Veri Tipleri">
                    </div>
    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="icerik_tipi" class="form-label">İçerik Tipi</label>
                            <select id="icerik_tipi" class="form-control">
                                <option value="video">Video</option>
                                <option value="metin">Belge / Döküman</option>
                                <option value="quiz">Test / Quiz</option>
                            </select>
                        </div>
                        
                        <!-- TAHMİNİ SÜRE ALANI (Sadece Belge ve Quiz için) -->
                        <div class="form-group" id="tahminiSureContainer" style="display: none;">
                            <label for="tahmini_sure" class="form-label">Tahmini Süre (Dakika)</label>
                            <input type="number" id="tahmini_sure" class="form-control" value="0" min="0">
                        </div>
                    </div>
    
                    <!-- DOSYA YÜKLEME ALANI (Hepsi için ortak) -->
                    <div class="form-group" id="dosyaInputContainer">
                        <label for="ders_dosyasi" id="ders_dosyasi_label" class="form-label">Ders Dosyası (Video)</label>
                        <input type="file" id="ders_dosyasi" class="form-control" accept="video/mp4,video/webm">
                    </div>
    
                    <!-- AÇIKLAMA ALANI (Hepsi için ortak) -->
                    <div class="form-group" id="aciklamaContainer">
                        <label for="ders_aciklama" class="form-label">Ders Açıklaması / İçerik Görünümü</label>
                        <textarea id="ders_aciklama" class="form-control" rows="4" placeholder="Ders notlarını, soruları veya içeriği buraya yazın (Zorunlu değil)..."></textarea>
                    </div>
    
                    <div class="form-group">
                        <label for="kaynak_url" class="form-label">Dış Kaynak Linki (Opsiyonel)</label>
                        <input type="url" id="kaynak_url" class="form-control" placeholder="Örn: Harici bir websitesi, Github linki vs.">
                    </div>
                    <div class="form-group form-group-checkbox">
                        <input type="checkbox" id="onizleme_mi">
                        <label for="onizleme_mi">Bu dersi "Ücretsiz Önizleme"ye aç</label>
                    </div>
    
                    <div class="modal-actions">
                        <button type="submit" class="btn-primary-lg-alt" id="dersSubmitBtn">Kaydet</button>
                        <button type="button" onclick="window.closeLessonModal()" class="btn-logout-alt">İptal</button>
                    </div>
                </form>
            </div>
        </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/assets/js/api.js"></script>
    <script type="module" src="/instructor/js/edit-course.js"></script>
</body>
</html>
