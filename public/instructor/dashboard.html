<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Egitmen Panosu</title>
    
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/instructor/css/instructor-common.css">
    <link rel="stylesheet" href="/instructor/css/instructor-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-content">
            <a href="/" class="logo" aria-label="EduNex Ana Sayfa">EduNex</a>
            
            <nav class="user-navigation" id="authNavContainer" aria-label="Kullanici Menusu">
                <div class="user-info-wrapper">
                    <i class="fas fa-user-circle user-icon" aria-hidden="true"></i>
                    <span id="userName" class="user-greeting">Egitmen Paneli</span>
                </div>
                <button type="button" onclick="handleLogout()" class="btn-logout-alt" aria-label="Cikis Yap">
                    <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Cikis Yap
                </button>
            </nav>
        </div>
    </header>

    <main class="container dashboard-container">
        
        <header class="page-header">
            <div class="header-text">
                <h1>Egitmen Panosu</h1>
                <p class="subtitle">Kurslarinizi, iceriklerinizi ve ogrenci istatistiklerinizi buradan yonetebilirsiniz.</p>
            </div>
            
            <div class="header-actions">
                <a href="/instructor/create-course.html" class="btn-primary-lg-alt" aria-label="Yeni Kurs Olustur">
                    <i class="fas fa-plus" aria-hidden="true"></i> Yeni Kurs Olustur
                </a>
            </div>
        </header>

        <section class="courses-section" aria-labelledby="courses-title">
            <div class="section-header-alt">
                <h2 id="courses-title" class="section-title">
                    <i class="fas fa-book-open" aria-hidden="true"></i> Yayindaki ve Taslak Kurslarim
                </h2>
                <div class="section-line"></div>
            </div>

            <div id="courseList" class="course-management-grid">
                <div class="loading-state">
                    <div class="spinner" aria-hidden="true"></div>
                    <p>Kurslariniz hazirlaniyor...</p>
                </div>
            </div>
        </section>

    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/instructor/js/instructor.js"></script>
    
    <script>
        /**
         * Egitmen Panosu - Sayfa ici temel islevler
         */

        // Cikis islemini yonetir
        function handleLogout() {
            if (typeof ApiService !== 'undefined' && typeof ApiService.logout === 'function') {
                ApiService.logout();
            } else {
                localStorage.clear();
                window.location.href = '/auth/index.html';
            }
        }

        // Sayfa yuklendiginde kullanici bilgilerini arayuze yansitir
        document.addEventListener('DOMContentLoaded', () => {
            const userNameElement = document.getElementById('userName');
            const userJson = localStorage.getItem('edunex_user');
            
            if (userJson && userNameElement) {
                try {
                    const user = JSON.parse(userJson);
                    if (user && user.ad) {
                        // XSS korumasi icin textContent kullanilmaktadir
                        userNameElement.textContent = `${user.ad} ${user.soyad || ''}`.trim();
                    }
                } catch (error) {
                    console.error('[DASHBOARD] Kullanici verisi okunurken hata olustu:', error.message);
                    // Hatali veriyi temizle
                    localStorage.removeItem('edunex_user');
                }
            }
        });
    </script>
</body>
</html>
