<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Egitmen Panosu</title>
    
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    
    <link rel="stylesheet" href="/main/css/main.css">
    
    <link rel="stylesheet" href="/instructor/css/instructor-common.css">
    <link rel="stylesheet" href="/instructor/css/instructor-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="navbar-container"></div>

    <main class="container dashboard-container" style="margin-top: 40px;">
        
        <header class="page-header">
            <div class="header-text">
                <h1>Egitmen Panosu</h1>
                <p class="subtitle">Kurslarinizi, iceriklerinizi ve ogrenci istatistiklerinizi buradan yonetebilirsiniz.</p>
            </div>
            
            <div class="header-actions">
                <a href="/instructor/create-course.html" class="btn-primary-lg-alt" aria-label="Yeni Kurs Olustur">
                    <i class="fas fa-plus" aria-hidden="true"></i> Yeni Kurs Olustur
                </a>
            </div>
        </header>

        <section class="courses-section" aria-labelledby="courses-title">
            <div class="section-header-alt">
                <h2 id="courses-title" class="section-title">
                    <i class="fas fa-book-open" aria-hidden="true"></i> Yayindaki ve Taslak Kurslarim
                </h2>
                <div class="section-line"></div>
            </div>

            <div id="courseList" class="course-management-grid">
                <div class="loading-state">
                    <div class="spinner" aria-hidden="true"></div>
                    <p>Kurslariniz hazirlaniyor...</p>
                </div>
            </div>
        </section>

    </main>

    <script src="/assets/js/api.js"></script>
    
    <script src="/main/js/main.js"></script>
    <script src="/main/js/loadNavbar.js"></script>
    
    <script type="module" src="/instructor/js/instructor.js"></script>
    
</body>
</html>
