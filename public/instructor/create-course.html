<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Yeni Kurs Olustur</title>
    
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/instructor/css/instructor-common.css">
    <link rel="stylesheet" href="/instructor/css/instructor-forms.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-content">
            <a href="/" class="logo" aria-label="EduNex Ana Sayfa">EduNex</a>
            <nav class="nav-actions" aria-label="Egitmen Navigasyonu">
                <a href="/instructor/dashboard.html" class="nav-link">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i> Panoya Don
                </a>
                <button type="button" onclick="handleLogout()" class="btn-logout-alt">Cikis Yap</button>
            </nav>
        </div>
    </header>

    <main class="container dashboard-container">
        <header class="page-header-section">
            <h1>Yeni Kurs Olustur</h1>
            <p class="subtitle">Uzmanliginizi dunyayla paylasmak icin kursunuzun temel bilgilerini eksiksiz doldurun.</p>
        </header>

        <section class="form-card">
            <form id="createCourseForm" class="course-form">
                
                <div class="form-section-header">
                    <h2 class="form-section-title">Genel Bilgiler</h2>
                </div>
                
                <div class="form-group full-width">
                    <label for="baslik" class="form-label">Kurs Basligi <span aria-hidden="true">*</span></label>
                    <input type="text" id="baslik" class="form-control" placeholder="Orn: Sifirdan Ileri Seviye Node.js Egitimi" required>
                </div>

                <div class="form-group full-width">
                    <label for="alt_baslik" class="form-label">Alt Baslik / Kisa Tanitim</label>
                    <input type="text" id="alt_baslik" class="form-control" placeholder="Kurs icerigini ozetleyen carpici bir cumle yazin">
                </div>
                <div class="form-group full-width">
                    <label for="aciklama" class="form-label">Kurs Açıklaması <span aria-hidden="true">*</span></label>
                    <textarea id="aciklama" class="form-control" rows="5" placeholder="Kursunuz hakkında detaylı bilgi verin..." required></textarea>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="kategori_id" class="form-label">Kategori <span aria-hidden="true">*</span></label>
                        <select id="kategori_id" class="form-control" required>
                            <option value="" disabled selected>Kategori Secin...</option>
                            </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="fiyat" class="form-label">Fiyat (TL) <span aria-hidden="true">*</span></label>
                        <input type="number" id="fiyat" class="form-control" placeholder="Ucretsiz icin 0 girin" min="0" step="0.01" required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="dil" class="form-label">Egitim Dili <span aria-hidden="true">*</span></label>
                        <select id="dil" class="form-control" required>
                            <option value="Turkce" selected>Turkce</option>
                            <option value="Ingilizce">Ingilizce</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="seviye" class="form-label">Zorluk Seviyesi <span aria-hidden="true">*</span></label>
                        <select id="seviye" class="form-control" required>
                            <option value="Baslangic">Baslangic</option>
                            <option value="Orta">Orta Seviye</option>
                            <option value="Ileri Seviye">Ileri Seviye</option>
                            <option value="Tum Seviyeler" selected>Tum Seviyeler</option>
                        </select>
                    </div>
                </div>

                <div class="form-section-header" style="margin-top: 30px;">
                    <h2 class="form-section-title">Detaylar ve Mufredat Hazirligi</h2>
                </div>

                <div class="form-group full-width">
                    <label for="gereksinimler" class="form-label">Gereksinimler</label>
                    <textarea id="gereksinimler" class="form-control" rows="3" placeholder="Ogrenciler bu kursa baslamadan once neyi bilmeli? (Her satira bir tane)"></textarea>
                </div>

                <div class="form-group full-width">
                    <label for="kazanimlar" class="form-label">Ogrenci Bu Kursun Sonunda Ne Kazanacak?</label>
                    <textarea id="kazanimlar" class="form-control" rows="3" placeholder="Kurs tamamlandiginda elde edilecek becerileri listeleyin."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary-lg-alt">
                        <i class="fas fa-save" aria-hidden="true"></i> Kursu Taslak Olarak Kaydet
                    </button>
                </div>
            </form>

            <div id="courseMessage" class="message-box" role="alert" aria-live="polite"></div>
        </section>
    </main>

    <script src="/assets/js/api.js"></script>
    <script type="module" src="/instructor/js/create-course.js"></script>
    
    <script>
        /**
         * Global Cikis Islemi (Inline Modul)
         */
        function handleLogout() {
            if (typeof ApiService !== 'undefined' && typeof ApiService.logout === 'function') {
                ApiService.logout();
            } else {
                localStorage.clear();
                window.location.href = '/auth/index.html';
            }
        }
    </script>
</body>
</html>
