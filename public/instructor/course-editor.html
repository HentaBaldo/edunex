<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EduNex - Online Eğitim Platformu</title>
        
        <link rel="stylesheet" href="/assets/css/style.css">
    </head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">EduNex Stüdyo</a>
        <div class="user-nav">
            <span style="font-weight: bold; color: var(--primary-color);">Eğitmen Paneli</span>
        </div>
    </nav>

    <div class="editor-container">
        
        <div class="section-panel">
            <h2 style="margin-top:0; border-bottom: 2px solid var(--primary-light); padding-bottom: 10px;">Kurs Temel Bilgileri</h2>
            <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                <div style="flex: 2; min-width: 300px;">
                    <form id="kursEkleFormu">
                        <div class="form-group"><label>Kurs Başlığı</label><input type="text" id="k_baslik" oninput="onizlemeGuncelle()" required></div>
                        <div style="display: flex; gap: 15px;">
                            <div class="form-group" style="flex:1;">
                                <label>Kategori</label>
                                <select id="k_kategori_id" required><option value="">Kategori Yükleniyor...</option></select>
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label>Seviye</label>
                                <select id="k_seviye" onchange="onizlemeGuncelle()">
                                    <option value="Başlangıç">Başlangıç</option><option value="Orta">Orta</option><option value="İleri">İleri</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group"><label>Detaylı Açıklama</label><textarea id="k_detay_aciklama" rows="4"></textarea></div>
                        
                        <div style="display: flex; gap: 15px;">
                            <div class="form-group" style="flex:1;"><label>Fiyat (₺)</label><input type="number" id="k_fiyat" oninput="onizlemeGuncelle()"></div>
                            <div class="form-group" style="flex:1;"><label>Kapak Görseli URL</label><input type="text" id="k_gorsel" oninput="onizlemeGuncelle()"></div>
                        </div>
                        <button type="submit" class="action-btn" style="width: auto; padding: 10px 30px;">Taslağı Kaydet</button>
                    </form>
                </div>

                <div style="flex: 1; min-width: 250px;">
                    <div class="preview-box">
                        <h3 style="font-size: 14px; color: #64748b; text-transform: uppercase;">Canlı Önizleme</h3>
                        <div class="course-card" style="margin:0; width: 100%;">
                            <div class="course-img" id="prev_img" style="background-color: #cbd5e1; height: 150px;"></div>
                            <div class="course-info">
                                <span class="badge" id="prev_seviye">Başlangıç</span>
                                <h3 class="course-title" id="prev_baslik">Kurs Başlığı</h3>
                                <div class="course-meta"><span class="price" id="prev_fiyat">Ücretsiz</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-panel" style="height: 600px;">
            <h2 style="margin-top:0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">Müfredat Yönetimi</h2>
            <div style="display: flex; gap: 25px; height: 90%;">
                
                <div style="flex: 1; background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; overflow-y: auto;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h4 style="margin:0;">Kurs Bölümleri</h4>
                        <button class="action-btn" style="width:auto; padding:5px 10px; font-size: 12px;">+ Yeni Bölüm</button>
                    </div>
                    <div id="bolumlerListesi">
                        </div>
                </div>

                <div id="dersYonetimAlani" style="flex: 1.5; padding: 20px; border: 2px dashed #cbd5e1; border-radius: 10px; overflow-y: auto;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h4 id="seciliBolumAdi" style="margin:0; color: #2563eb;">1. Bölüm İçeriği</h4>
                        <button class="action-btn" style="width:auto; padding:5px 10px; font-size: 12px;">+ Yeni Ders Ekle</button>
                    </div>
                    <div id="derslerListesi">
                         </div>
                </div>
            </div>
        </div>

    </div>
    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/instructor.js"></script>
</body>
</html>
